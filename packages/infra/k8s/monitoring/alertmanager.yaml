apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: atb-monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: pagerduty
    receivers:
      - name: 'default'
        email_configs:
          - to: 'alerts@agritrace.bj'
            from: 'alertmanager@agritrace.bj'
            smarthost: 'smtp.sendgrid.net:587'
      - name: 'pagerduty'
        pagerduty_configs:
          - routing_key: '${PAGERDUTY_ROUTING_KEY}'
