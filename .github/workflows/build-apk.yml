name: Build APK

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/mobile/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: packages/mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (génère android/)
        run: npx expo prebuild --no-install

      - name: Debug - check android/ structure
        run: |
          echo "=== android/ contents ==="
          ls -la android/ 2>/dev/null || echo "android/ NOT FOUND"
          echo "=== build.gradle ==="
          cat android/build.gradle 2>/dev/null || echo "build.gradle NOT FOUND"
          echo "=== app/build.gradle ==="
          cat android/app/build.gradle 2>/dev/null | head -30 || echo "app/build.gradle NOT FOUND"

      - name: Patch Kotlin version
        run: |
          sed -i "s/ext.kotlinVersion = .*/ext.kotlinVersion = '1.9.25'/" android/build.gradle
          echo "=== Kotlin version after patch ==="
          grep "ext.kotlinVersion" android/build.gradle || echo "ext.kotlinVersion NOT FOUND in android/build.gradle"
          echo "=== Trying android/build.gradle (project-level) ==="
          cat android/build.gradle | head -20

      - name: Build APK debug
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agritrace-debug
          path: packages/mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
