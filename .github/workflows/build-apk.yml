name: Build APK

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/mobile/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: packages/mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (génère android/)
        run: npx expo prebuild --no-install

      - name: Debug - check android/ structure
        run: |
          echo "=== android/ contents ==="
          ls -la android/ 2>/dev/null || echo "android/ NOT FOUND"
          echo "=== build.gradle ==="
          cat android/build.gradle 2>/dev/null || echo "build.gradle NOT FOUND"
          echo "=== app/build.gradle ==="
          cat android/app/build.gradle 2>/dev/null | head -30 || echo "app/build.gradle NOT FOUND"

      - name: Patch Kotlin version (ext + version catalog)
        run: |
          # Patch project-level build.gradle
          sed -i "s/ext.kotlinVersion = .*/ext.kotlinVersion = '1.9.25'/" android/build.gradle 2>/dev/null || true
          echo "=== ext.kotlinVersion after patch ==="
          grep "ext.kotlinVersion" android/build.gradle || echo "NOT FOUND in build.gradle"

          # Patch version catalog (libs.versions.toml) if exists
          if [ -f android/gradle/libs.versions.toml ]; then
            sed -i 's/kotlin = "1.9.24"/kotlin = "1.9.25"/' android/gradle/libs.versions.toml
            echo "=== libs.versions.toml kotlin after patch ==="
            grep "kotlin" android/gradle/libs.versions.toml
          fi

          # Also patch the react-native bundled catalog (used by version catalog)
          for f in node_modules/react-native/gradle/libs.versions.toml node_modules/@react-native/gradle-plugin/gradle/libs.versions.toml; do
            if [ -f "$f" ]; then
              sed -i 's/kotlin = "1.9.24"/kotlin = "1.9.25"/' "$f"
              echo "=== Patched $f ==="
              grep "kotlin" "$f"
            fi
          done

          echo "=== Full android/build.gradle ==="
          cat android/build.gradle 2>/dev/null | head -30

      - name: Build APK debug
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agritrace-debug
          path: packages/mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
