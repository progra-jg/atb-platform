name: Build APK

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/mobile/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: packages/mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (génère android/)
        run: npx expo prebuild --no-install

      - name: Build APK debug
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agritrace-debug
          path: packages/mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
